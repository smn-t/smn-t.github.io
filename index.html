<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>—</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }

    body {
      font-family: 'Share Tech Mono', 'Courier New', 'Lucida Console', monospace;
      color: #00ff41;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 99;
    }

    /* Scanlines */
    .scanlines::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.12) 2px,
        rgba(0, 0, 0, 0.12) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Page system */
    .page {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }

    .page.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* =====================
       PAGE 1 — GATE
    ===================== */

    .gate-content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.6rem;
    }

    #prompt-line {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      letter-spacing: 0.15em;
      text-shadow:
        0 0 4px #00ff41,
        0 0 10px #00ff41,
        0 0 22px #00ff41,
        0 0 44px rgba(0, 255, 65, 0.4);
    }

    .cursor {
      display: inline-block;
      animation: blink 1s step-end infinite;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    #input-wrapper {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: opacity 0.4s ease;
    }

    .prompt-arrow {
      font-size: 1.4rem;
      text-shadow:
        0 0 4px #00ff41,
        0 0 10px #00ff41;
    }

    #gate-input {
      position: absolute;
      left: -9999px;
      opacity: 0;
      width: 1px;
      height: 1px;
    }

    #input-display {
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      color: #00ff41;
      text-shadow: 0 0 6px #00ff41;
    }

    #access-denied {
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      color: #ff2222;
      text-shadow: 0 0 8px #ff2222, 0 0 18px rgba(255, 34, 34, 0.5);
      opacity: 0;
      min-height: 1.2em;
    }

    #access-denied.flash {
      opacity: 1;
      animation: shake 0.4s ease, denied-fade 1.0s ease 0.9s forwards;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }

    @keyframes denied-fade {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* =====================
       PAGE 2 — MAIN
    ===================== */

    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.8rem;
      padding: 2rem;
      max-width: 700px;
      width: 100%;
    }

    /* --- Logo / Sigil --- */

    #logo-symbol {
      animation: glitch 8s steps(1) infinite;
    }

    @keyframes glitch {
      0%, 94%, 100% { transform: translate(0); filter: none; }
      95%            { transform: translate(-3px, 1px); filter: hue-rotate(90deg) brightness(1.3); }
      96%            { transform: translate(3px, -1px); }
      97%            { transform: translate(0); filter: hue-rotate(0deg); }
    }

    .sigil-outer {
      position: relative;
      width: 110px;
      height: 110px;
    }

    .sigil-ring {
      position: absolute;
      inset: 0;
      border: 1px solid #00ff41;
      border-radius: 50%;
      animation: glow-pulse 3s ease-in-out infinite, spin 20s linear infinite;
    }

    @keyframes glow-pulse {
      0%, 100% {
        box-shadow:
          0 0 4px #00ff41,
          0 0 12px #00ff41,
          inset 0 0 4px rgba(0, 255, 65, 0.1);
        opacity: 0.75;
      }
      50% {
        box-shadow:
          0 0 8px #00ff41,
          0 0 24px #00ff41,
          0 0 50px rgba(0, 255, 65, 0.3),
          inset 0 0 8px rgba(0, 255, 65, 0.2);
        opacity: 1;
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .sigil-inner {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 38%;
      height: 38%;
      transform: translate(-50%, -50%);
      border: 1px solid #00ff41;
      border-radius: 50%;
      animation: glow-pulse-inv 4.5s ease-in-out infinite;
    }

    @keyframes glow-pulse-inv {
      0%, 100% {
        box-shadow: 0 0 6px #00ff41, inset 0 0 6px rgba(0, 255, 65, 0.15);
        opacity: 1;
      }
      50% {
        box-shadow: 0 0 2px #00ff41, inset 0 0 2px rgba(0, 255, 65, 0.05);
        opacity: 0.5;
      }
    }

    .sigil-crosshair {
      position: absolute;
      inset: 0;
    }

    .sigil-crosshair::before,
    .sigil-crosshair::after {
      content: '';
      position: absolute;
      background: #00ff41;
      opacity: 0.6;
    }

    /* horizontal line */
    .sigil-crosshair::before {
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      transform: translateY(-50%);
      box-shadow: 0 0 4px #00ff41;
    }

    /* vertical line */
    .sigil-crosshair::after {
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      transform: translateX(-50%);
      box-shadow: 0 0 4px #00ff41;
    }

    /* --- Cryptic sentence --- */

    #cryptic-sentence {
      color: #00aa2b;
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      letter-spacing: 0.2em;
      text-align: center;
      line-height: 2;
      text-shadow: 0 0 6px rgba(0, 170, 43, 0.6);
      min-height: 3em;
      white-space: pre-line;
    }

    /* --- Presence notice --- */

    #presence-notice {
      color: #00ff41;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      letter-spacing: 0.35em;
      text-align: center;
      text-shadow:
        0 0 4px #00ff41,
        0 0 10px #00ff41,
        0 0 22px rgba(0, 255, 65, 0.4);
      min-height: 1.4em;
    }

    /* --- Puzzle area --- */

    #puzzle-area {
      width: 100%;
      border: 1px solid rgba(0, 255, 65, 0.15);
      padding: 1.8rem 2rem;
      font-size: clamp(0.65rem, 1.8vw, 0.8rem);
      letter-spacing: 0.12em;
      color: #00aa2b;
      line-height: 2;
    }

    .puzzle-label {
      color: #00ff41;
      letter-spacing: 0.3em;
      text-shadow: 0 0 6px #00ff41;
      display: block;
      margin-bottom: 1.2rem;
    }

    .puzzle-lines {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .signal-bar-container {
      margin-top: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .signal-bar {
      flex: 1;
      height: 2px;
      background: rgba(0, 255, 65, 0.12);
      position: relative;
      overflow: hidden;
    }

    .signal-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background: #00ff41;
      box-shadow: 0 0 6px #00ff41;
      animation: signal-crawl 8s ease-out forwards;
    }

    @keyframes signal-crawl {
      from { width: 0%; }
      to   { width: 12%; }
    }

    .signal-pct {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- PAGE 1: Gate -->
  <div id="page-gate" class="page active">
    <div class="scanlines"></div>
    <div class="gate-content">
      <div id="prompt-line">
        <span id="typewriter-text"></span><span class="cursor" id="prompt-cursor">_</span>
      </div>
      <div id="input-wrapper" style="opacity:0">
        <span class="prompt-arrow">&gt;</span>
        <span id="input-display"></span><span class="cursor">_</span>
        <input id="gate-input" type="password" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      </div>
      <div id="access-denied" aria-live="polite">ACCESS DENIED</div>
    </div>
  </div>

  <!-- PAGE 2: Main -->
  <div id="page-main" class="page">
    <div class="scanlines"></div>
    <div class="main-content">

      <div id="logo-symbol" aria-hidden="true">
        <div class="sigil-outer">
          <div class="sigil-ring"></div>
          <div class="sigil-inner"></div>
          <div class="sigil-crosshair"></div>
        </div>
      </div>

      <p id="cryptic-sentence"></p>

      <p id="presence-notice"></p>

      <div id="puzzle-area">
        <span class="puzzle-label">[ SECTOR 7 — RESTRICTED ]</span>
        <div class="puzzle-lines">
          <span>&gt; LOADING TRANSMISSION...</span>
          <span>&gt; SIGNAL ACQUIRED: 47.3%</span>
          <span>&gt; DECRYPTION KEY: ░░░░░░░░░░░░</span>
          <span>&gt; STATUS: PENDING</span>
        </div>
        <div class="signal-bar-container">
          <div class="signal-bar"></div>
          <span class="signal-pct">12%</span>
        </div>
      </div>

    </div>
  </div>

  <script>
    function typewriter(element, text, speed, onComplete) {
      let i = 0;
      const tick = () => {
        if (i < text.length) {
          element.textContent += text[i++];
          setTimeout(tick, speed + Math.random() * speed * 0.4);
        } else if (onComplete) {
          onComplete();
        }
      };
      setTimeout(tick, speed);
    }

    function showDenied() {
      const el = document.getElementById('access-denied');
      el.classList.remove('flash');
      void el.offsetWidth; // force reflow to re-trigger animation
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 2100);
    }

    function initPage2() {
      const el = document.getElementById('cryptic-sentence');
      const notice = document.getElementById('presence-notice');
      const line1 = 'THE SEQUENCE DOES NOT REPEAT. IT COMPOUNDS.';
      const line2 = '\nTHOSE WHO REACH THIS PAGE WERE ALREADY KNOWN.';
      typewriter(el, line1, 80, () => {
        setTimeout(() => {
          typewriter(el, line2, 80, () => {
            setTimeout(() => {
              typewriter(notice, 'WE KNOW YOU ARE HERE.', 90, null);
            }, 600);
          });
        }, 400);
      });
    }

    function notifyDiscord() {
      const now = new Date();
      const ts = now.toISOString();
      fetch('https://discord.com/api/webhooks/1491138692830728363/TmHShEsIvuiQw3WkvJh4IjcxRMKwTr4YjwZQYkmDuWClyk_3_SZICF3Qh-h9-ARbRb1F', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          content: `\`[${ts}]\` — someone entered.`
        })
      }).catch(() => {});
    }

    function unlockToPage2() {
      const gate = document.getElementById('page-gate');
      const main = document.getElementById('page-main');
      notifyDiscord();
      gate.classList.remove('active');
      setTimeout(() => {
        main.classList.add('active');
        initPage2();
      }, 1200);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const textEl  = document.getElementById('typewriter-text');
      const wrapper = document.getElementById('input-wrapper');
      const input   = document.getElementById('gate-input');

      const display = document.getElementById('input-display');
      const promptCursor = document.getElementById('prompt-cursor');

      input.addEventListener('input', () => {
        display.textContent = '•'.repeat(input.value.length);
      });

      typewriter(textEl, 'WHO ARE YOU?', 60, () => {
        promptCursor.style.display = 'none';
        wrapper.style.opacity = '1';
        setTimeout(() => input.focus(), 200);
      });

      document.getElementById('page-gate').addEventListener('click', () => input.focus());

      input.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        const val = input.value.trim().toLowerCase();
        input.value = '';
        display.textContent = '';
        if (val === 'marius') {
          unlockToPage2();
        } else {
          showDenied();
        }
      });
    });
  </script>

</body>
</html>
