<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>—</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }

    body {
      font-family: 'Share Tech Mono', 'Courier New', 'Lucida Console', monospace;
      color: #00ff41;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 99;
    }

    /* Scanlines */
    .scanlines::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.12) 2px,
        rgba(0, 0, 0, 0.12) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Page system */
    .page {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }

    .page.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* =====================
       PAGE 1 — GATE
    ===================== */

    .gate-content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.6rem;
    }

    #prompt-line {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      letter-spacing: 0.15em;
      text-shadow:
        0 0 4px #00ff41,
        0 0 10px #00ff41,
        0 0 22px #00ff41,
        0 0 44px rgba(0, 255, 65, 0.4);
    }

    .cursor {
      display: inline-block;
      animation: blink 1s step-end infinite;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    #input-wrapper {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: opacity 0.4s ease;
    }

    .prompt-arrow {
      font-size: 1.4rem;
      text-shadow:
        0 0 4px #00ff41,
        0 0 10px #00ff41;
    }

    #gate-input {
      position: absolute;
      inset: 0;
      opacity: 0.01;
      font-size: 16px;
      cursor: text;
      -webkit-tap-highlight-color: transparent;
    }

    #input-display {
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      color: #00ff41;
      text-shadow: 0 0 6px #00ff41;
    }

    #access-denied {
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      color: #ff2222;
      text-shadow: 0 0 8px #ff2222, 0 0 18px rgba(255, 34, 34, 0.5);
      opacity: 0;
      min-height: 1.2em;
    }

    #access-denied.flash {
      opacity: 1;
      animation: shake 0.4s ease, denied-fade 1.0s ease 0.9s forwards;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }

    @keyframes denied-fade {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* =====================
       PAGE 2 — MAIN
    ===================== */

    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.8rem;
      padding: 2rem;
      max-width: 700px;
      width: 100%;
    }

    /* --- Logo / Sigil --- */

    #logo-symbol {
      animation: glitch 8s steps(1) infinite;
    }

    @keyframes glitch {
      0%, 94%, 100% { transform: translate(0); filter: none; }
      95%            { transform: translate(-3px, 1px); filter: hue-rotate(90deg) brightness(1.3); }
      96%            { transform: translate(3px, -1px); }
      97%            { transform: translate(0); filter: hue-rotate(0deg); }
    }

    .sigil-outer {
      position: relative;
      width: 110px;
      height: 110px;
    }

    .sigil-ring {
      position: absolute;
      inset: 0;
      border: 1px solid #00ff41;
      border-radius: 50%;
      animation: glow-pulse 3s ease-in-out infinite, spin 20s linear infinite;
    }

    @keyframes glow-pulse {
      0%, 100% {
        box-shadow:
          0 0 4px #00ff41,
          0 0 12px #00ff41,
          inset 0 0 4px rgba(0, 255, 65, 0.1);
        opacity: 0.75;
      }
      50% {
        box-shadow:
          0 0 8px #00ff41,
          0 0 24px #00ff41,
          0 0 50px rgba(0, 255, 65, 0.3),
          inset 0 0 8px rgba(0, 255, 65, 0.2);
        opacity: 1;
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .sigil-inner {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 38%;
      height: 38%;
      transform: translate(-50%, -50%);
      border: 1px solid #00ff41;
      border-radius: 50%;
      animation: glow-pulse-inv 4.5s ease-in-out infinite;
    }

    @keyframes glow-pulse-inv {
      0%, 100% {
        box-shadow: 0 0 6px #00ff41, inset 0 0 6px rgba(0, 255, 65, 0.15);
        opacity: 1;
      }
      50% {
        box-shadow: 0 0 2px #00ff41, inset 0 0 2px rgba(0, 255, 65, 0.05);
        opacity: 0.5;
      }
    }

    .sigil-crosshair {
      position: absolute;
      inset: 0;
    }

    .sigil-crosshair::before,
    .sigil-crosshair::after {
      content: '';
      position: absolute;
      background: #00ff41;
      opacity: 0.6;
    }

    /* horizontal line */
    .sigil-crosshair::before {
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      transform: translateY(-50%);
      box-shadow: 0 0 4px #00ff41;
    }

    /* vertical line */
    .sigil-crosshair::after {
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      transform: translateX(-50%);
      box-shadow: 0 0 4px #00ff41;
    }

    /* --- Cryptic sentence --- */

    #cryptic-sentence {
      color: #00aa2b;
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      letter-spacing: 0.2em;
      text-align: center;
      line-height: 2;
      text-shadow: 0 0 6px rgba(0, 170, 43, 0.6);
      min-height: 3em;
      white-space: pre-line;
    }

    /* --- Presence notice --- */

    #presence-notice {
      color: #00ff41;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      letter-spacing: 0.35em;
      text-align: center;
      text-shadow:
        0 0 4px #00ff41,
        0 0 10px #00ff41,
        0 0 22px rgba(0, 255, 65, 0.4);
      min-height: 1.4em;
    }

    #presence-logged {
      color: #00aa2b;
      font-size: clamp(0.6rem, 1.6vw, 0.75rem);
      letter-spacing: 0.3em;
      text-align: center;
      text-shadow: 0 0 6px rgba(0, 170, 43, 0.4);
      min-height: 1.2em;
    }

    /* =====================
       PAGE 2 — SCROLLABLE
    ===================== */

    #page-main {
      overflow-y: auto;
    }

    .main-content {
      min-height: 100%;
    }

    /* =====================
       STEGO PUZZLE
    ===================== */

    #stego-image-wrapper {
      width: 100%;
      max-width: 680px;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(0, 255, 65, 0.35);
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.1), inset 0 0 20px rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: opacity 0.8s ease, box-shadow 0.6s ease;
    }

    #stego-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      width: 80%;
      transition: opacity 0.4s ease;
    }

    .stego-hint {
      font-size: clamp(0.6rem, 1.6vw, 0.75rem);
      letter-spacing: 0.25em;
      color: #00ff41;
      text-shadow: 0 0 4px #00ff41;
    }

    .stego-bar-container {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .stego-bar {
      flex: 1;
      height: 2px;
      background: rgba(0, 255, 65, 0.12);
      overflow: hidden;
    }

    .stego-bar-fill {
      height: 100%;
      width: 0%;
      background: #00ff41;
      box-shadow: 0 0 6px #00ff41;
      transition: width 0.1s linear;
    }

    .stego-bar-pct {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      white-space: nowrap;
      color: #00aa2b;
    }

    #stego-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #stego-input-area {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      border-bottom: 1px solid rgba(0, 255, 65, 0.4);
      padding-bottom: 0.4rem;
      transition: opacity 0.6s ease;
    }

    #stego-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      letter-spacing: 0.15em;
      color: #00ff41;
      caret-color: #00ff41;
    }

    #stego-input::placeholder {
      color: rgba(0, 255, 65, 0.25);
      letter-spacing: 0.1em;
    }

    #stego-denied {
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      color: #ff2222;
      text-shadow: 0 0 8px #ff2222, 0 0 18px rgba(255, 34, 34, 0.5);
      min-height: 1.2em;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    #stego-denied.stego-visible {
      opacity: 1;
      animation: shake 0.4s ease, denied-fade 1.0s ease 0.9s forwards;
    }

    #stego-success-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #stego-success-overlay.stego-visible {
      opacity: 1;
      pointer-events: auto;
    }

    #stego-success-text {
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      letter-spacing: 0.2em;
      color: #00ff41;
      text-shadow:
        0 0 4px #00ff41,
        0 0 12px #00ff41,
        0 0 28px rgba(0, 255, 65, 0.5);
      text-align: center;
    }

    #decrypt-btn {
      display: inline-block;
      padding: 0.7rem 1.6rem;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: inherit;
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      letter-spacing: 0.3em;
      text-decoration: none;
      text-shadow: 0 0 6px #00ff41;
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.2), inset 0 0 10px rgba(0, 255, 65, 0.05);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease, box-shadow 0.3s ease;
      animation: none;
    }

    #decrypt-btn.stego-visible {
      opacity: 1;
      pointer-events: auto;
      animation: decrypt-pulse 2s ease-in-out infinite;
    }

    #decrypt-btn:hover {
      background: rgba(0, 255, 65, 0.08);
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.5), inset 0 0 12px rgba(0, 255, 65, 0.1);
    }

    @keyframes decrypt-pulse {
      0%, 100% {
        box-shadow: 0 0 10px rgba(0, 255, 65, 0.2), inset 0 0 10px rgba(0, 255, 65, 0.05);
        text-shadow: 0 0 6px #00ff41;
      }
      50% {
        box-shadow: 0 0 25px rgba(0, 255, 65, 0.6), 0 0 50px rgba(0, 255, 65, 0.2), inset 0 0 14px rgba(0, 255, 65, 0.15);
        text-shadow: 0 0 6px #00ff41, 0 0 16px #00ff41;
      }
    }
  </style>
</head>
<body>

  <!-- PAGE 1: Gate -->
  <div id="page-gate" class="page active">
    <div class="scanlines"></div>
    <div class="gate-content">
      <div id="prompt-line">
        <span id="typewriter-text"></span><span class="cursor" id="prompt-cursor">_</span>
      </div>
      <div id="input-wrapper" style="opacity:0">
        <span class="prompt-arrow">&gt;</span>
        <span id="input-display"></span><span class="cursor">_</span>
        <input id="gate-input" type="text" inputmode="text" enterkeyhint="done" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      </div>
      <div id="access-denied" aria-live="polite">ACCESS DENIED</div>
    </div>
  </div>

  <!-- PAGE 2: Main -->
  <div id="page-main" class="page">
    <div class="scanlines"></div>
    <div class="main-content">

      <div id="logo-symbol" aria-hidden="true">
        <div class="sigil-outer">
          <div class="sigil-ring"></div>
          <div class="sigil-inner"></div>
          <div class="sigil-crosshair"></div>
        </div>
      </div>

      <p id="cryptic-sentence"></p>

      <p id="presence-notice"></p>

      <p id="presence-logged"></p>

      <div id="stego-image-wrapper" style="opacity:0">
        <div id="stego-loading">
          <span class="stego-hint">IMAGE PENDING UPLOAD</span>
          <div class="stego-bar-container">
            <div class="stego-bar"><div class="stego-bar-fill"></div></div>
            <span class="stego-bar-pct">0%</span>
          </div>
        </div>
        <img id="stego-image" src="Gemini_Generated_Image_7t49gg7t49gg7t49.png" alt="" />
      </div>

      <div id="stego-input-area" style="opacity:0">
        <span class="prompt-arrow">&gt;</span>
        <input id="stego-input" type="text" autocomplete="off" autocorrect="off"
               autocapitalize="off" spellcheck="false"
               placeholder="ENTER DECODED MESSAGE..." />
      </div>
      <div id="stego-denied">INCORRECT — TRY AGAIN</div>
      <div id="stego-success-overlay">
        <div id="stego-success-text"></div>
        <a id="decrypt-btn" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
           target="_blank" rel="noopener noreferrer">[ DECRYPT MESSAGE ]</a>
      </div>

    </div>
  </div>

  <script>
    function typewriter(element, text, speed, onComplete) {
      let i = 0;
      const tick = () => {
        if (i < text.length) {
          element.textContent += text[i++];
          setTimeout(tick, speed + Math.random() * speed * 0.4);
        } else if (onComplete) {
          onComplete();
        }
      };
      setTimeout(tick, speed);
    }

    function showDenied() {
      const el = document.getElementById('access-denied');
      el.classList.remove('flash');
      void el.offsetWidth; // force reflow to re-trigger animation
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 2100);
    }

    function initPage2() {
      const el = document.getElementById('cryptic-sentence');
      const notice = document.getElementById('presence-notice');
      const line1 = 'NOT EVERYTHING IS AS IT APPEARS.';
      const line2 = '\nSOME TRUTHS HIDE IN PLAIN SIGHT.';
      typewriter(el, line1, 80, () => {
        setTimeout(() => {
          typewriter(el, line2, 80, () => {
            setTimeout(() => {
              typewriter(notice, 'LOOK CLOSER.', 90, () => {
                setTimeout(() => {
                  const logged = document.getElementById('presence-logged');
                  typewriter(logged, 'YOUR PRESENCE HAS BEEN NOTED.', 70, () => {
                    setTimeout(revealImageBox, 1200);
                  });
                }, 800);
              });
            }, 600);
          });
        }, 400);
      });
    }

    function revealImageBox() {
      const wrapper = document.getElementById('stego-image-wrapper');
      wrapper.style.opacity = '1';
      setTimeout(runLoadingBar, 900);
    }

    function runLoadingBar() {
      const fill = document.querySelector('.stego-bar-fill');
      const pct  = document.querySelector('.stego-bar-pct');
      let progress = 0;

      const tick = () => {
        progress += Math.random() * 6 + 1;
        if (progress >= 100) {
          progress = 100;
          fill.style.width = '100%';
          pct.textContent = '100%';
          setTimeout(showLoadedImage, 500);
          return;
        }
        fill.style.width = progress + '%';
        pct.textContent = Math.floor(progress) + '%';
        setTimeout(tick, 80 + Math.random() * 120);
      };
      tick();
    }

    function showLoadedImage() {
      const wrapper = document.getElementById('stego-image-wrapper');
      const loading = document.getElementById('stego-loading');
      const img     = document.getElementById('stego-image');

      // Flash
      wrapper.style.boxShadow = '0 0 30px rgba(0,255,65,0.6), inset 0 0 30px rgba(0,255,65,0.15)';

      setTimeout(() => {
        loading.style.opacity = '0';
        setTimeout(() => {
          loading.style.display = 'none';
          if (img.getAttribute('src')) {
            img.style.display = 'block';
          }
          wrapper.style.boxShadow = '';
          setTimeout(revealStegoInput, 600);
        }, 400);
      }, 200);
    }

    function revealStegoInput() {
      const inputArea = document.getElementById('stego-input-area');
      inputArea.style.transition = 'opacity 0.6s ease';
      inputArea.style.opacity = '1';
    }

    function notifyDiscord() {
      const now = new Date();
      const ts = now.toISOString();
      fetch('https://discord.com/api/webhooks/1491138692830728363/TmHShEsIvuiQw3WkvJh4IjcxRMKwTr4YjwZQYkmDuWClyk_3_SZICF3Qh-h9-ARbRb1F', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          content: `\`[${ts}]\` — someone entered.`
        })
      }).catch(() => {});
    }

    function logAttempt(val) {
      const now = new Date();
      const ts = now.toISOString();
      fetch('https://discord.com/api/webhooks/1491138692830728363/TmHShEsIvuiQw3WkvJh4IjcxRMKwTr4YjwZQYkmDuWClyk_3_SZICF3Qh-h9-ARbRb1F', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          content: `\`[${ts}]\` — login attempt: \`${val}\``
        })
      }).catch(() => {});
    }

    function unlockToPage2() {
      const gate = document.getElementById('page-gate');
      const main = document.getElementById('page-main');
      notifyDiscord();
      gate.classList.remove('active');
      setTimeout(() => {
        main.classList.add('active');
        initPage2();
      }, 1200);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const textEl  = document.getElementById('typewriter-text');
      const wrapper = document.getElementById('input-wrapper');
      const input   = document.getElementById('gate-input');

      const display = document.getElementById('input-display');
      const promptCursor = document.getElementById('prompt-cursor');

      input.addEventListener('input', () => {
        display.textContent = '•'.repeat(input.value.length);
      });

      typewriter(textEl, 'WHO ARE YOU?', 60, () => {
        promptCursor.style.display = 'none';
        wrapper.style.opacity = '1';
        setTimeout(() => input.focus(), 200);
      });

async function hashInput(str) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
      }

      // ── Stego puzzle ──────────────────────────────────────
      const STEGO_ANSWER = 'test';

      document.getElementById('stego-input').addEventListener('keyup', (e) => {
        if (e.key !== 'Enter' && e.keyCode !== 13) return;
        const val = e.target.value.trim().toLowerCase();
        if (val === STEGO_ANSWER) {
          stegoSuccess();
        } else {
          stegoShowDenied();
        }
      });

      function stegoShowDenied() {
        const el = document.getElementById('stego-denied');
        el.classList.remove('stego-visible');
        void el.offsetWidth;
        el.classList.add('stego-visible');
        setTimeout(() => el.classList.remove('stego-visible'), 2100);
      }

      function stegoSuccess() {
        const inputArea = document.getElementById('stego-input-area');
        const overlay   = document.getElementById('stego-success-overlay');
        const textEl    = document.getElementById('stego-success-text');
        const btn       = document.getElementById('decrypt-btn');

        inputArea.style.opacity = '0';
        inputArea.style.pointerEvents = 'none';

        overlay.classList.add('stego-visible');
        typewriter(textEl, '// DECRYPTION SUCCESSFUL — MESSAGE UNLOCKED', 40, () => {
          setTimeout(() => btn.classList.add('stego-visible'), 400);
        });
      }
      // ──────────────────────────────────────────────────────

      input.addEventListener('keyup', async (e) => {
        if (e.key !== 'Enter' && e.keyCode !== 13) return;
        const val = input.value.trim().toLowerCase();
        input.value = '';
        display.textContent = '';
        logAttempt(val);
        const hash = await hashInput(val);
        if (hash === '5b39bfccb1447d4aae30e7a4fb0f4ba37e79ea96ec54b5ba7223979a15e4d0ae') {
          unlockToPage2();
        } else {
          showDenied();
        }
      });
    });
  </script>

</body>
</html>
